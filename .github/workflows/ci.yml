name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cybersec
      JWT_ACCESS_SECRET: ci_access_secret_that_is_long_enough_123
      JWT_REFRESH_SECRET: ci_refresh_secret_that_is_long_enough_456
      REQUIRE_STRONG_SECRETS: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma validate
      - run: npm test
      - run: npm run test:smoke
      - run: npm audit --audit-level=high

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high

  deploy-ready-check:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cybersec
      JWT_ACCESS_SECRET: ci_access_secret_that_is_long_enough_123
      JWT_REFRESH_SECRET: ci_refresh_secret_that_is_long_enough_456
      REQUIRE_STRONG_SECRETS: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma validate
      - run: node scripts/prod-bootstrap.js
