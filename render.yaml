services:
  # AI Microservice (Private Service - accessible only within Render network)
  - type: pserv
    name: cyberguard-ai
    env: docker
    dockerContext: ai-service
    dockerfilePath: Dockerfile
    envVars:
      - key: MODEL_VERSION
        value: threat-rf-v1
      - key: AI_SERVICE_API_KEY
        generateValue: true # Render will generate a secure random string automatically

  # Backend REST & WebSocket API (Web Service - publicly accessible)
  - type: web
    name: cyberguard-backend
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      # Database connection (User inputs Neon URL during blueprint deployment)
      - key: DATABASE_URL
        sync: false

      # AI microservice integration
      - key: AI_SERVICE_URL
        value: http://cyberguard-ai:8000
      - key: AI_SERVICE_API_KEY
        fromService:
          name: cyberguard-ai
          type: pserv
          envVarKey: AI_SERVICE_API_KEY

      # Security secrets (Render generates secure random strings automatically)
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REQUIRE_STRONG_SECRETS
        value: "true"

      # Environment configs
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: LOG_LEVEL
        value: info

      # CORS & Frontend Origins (User inputs Vercel URL)
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # Operational configs
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: AUTO_THREAT_SCAN_ENABLED
        value: "true"
      - key: ALERT_ESCALATION_ENABLED
        value: "true"
