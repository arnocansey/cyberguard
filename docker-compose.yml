services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cybersec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cybersec
      JWT_ACCESS_SECRET: change_access_secret
      JWT_REFRESH_SECRET: change_refresh_secret
      ACCESS_TOKEN_EXPIRES: 15m
      REFRESH_TOKEN_EXPIRES: 7d
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_ORIGIN: http://localhost
    depends_on:
      - postgres
      - ai-service
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost
    depends_on:
      - backend
    ports:
      - "3000:3000"

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
